<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repository Referenze — Practice Data, AI &amp; RPA</title>
    <!--
      Nessun build richiesto: apre direttamente da qualunque hosting statico
      (GitHub Pages, Firebase Hosting, Netlify...). React, xlsx e mammoth sono
      caricati da esm.sh; Firebase dai build ufficiali su gstatic.com (più
      affidabili per l'uso diretto via import map, senza bundler).
      app.js è già JavaScript puro (JSX già compilato in anticipo con Babel).
    -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
          "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
          "xlsx": "https://esm.sh/xlsx@0.18.5",
          "mammoth": "https://esm.sh/mammoth@1.7.0",
          "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
